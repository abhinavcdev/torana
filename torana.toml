# Example torana config. See README.md for the full field reference.

[global]
log_format = "json"
log_level = "info"
metrics_addr = "127.0.0.1:9090"

[[listener]]
addr = "127.0.0.1:8080"
protocol = "http"

# HTTPS termination — generate a self-signed test pair with scripts/setup.sh
# [[listener]]
# addr = "127.0.0.1:8443"
# protocol = "https"
# tls_cert = "./certs/tls.crt"
# tls_key = "./certs/tls.key"

[[route]]
name = "default"
upstream = [
  { addr = "http://localhost:9999", weight = 100 },
]

[route.timeout]
total = "30s"
