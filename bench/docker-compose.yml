# Local benchmark: torana vs Caddy vs nginx, all proxying the same backend.
# Usage: ./bench/bench.sh   (see bench/README.md)

services:
  backend:
    image: nginx:alpine
    volumes:
      - ./backend:/usr/share/nginx/html:ro

  torana:
    build:
      context: ..
      dockerfile: Dockerfile
    volumes:
      - ./configs/torana.toml:/etc/torana/torana.toml:ro
    depends_on: [backend]

  caddy:
    image: caddy:2-alpine
    volumes:
      - ./configs/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on: [backend]

  nginx-proxy:
    image: nginx:alpine
    volumes:
      - ./configs/nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [backend]

  # Load generator, run on demand by bench.sh (not started by `up`)
  fortio:
    image: fortio/fortio
    profiles: [tool]
